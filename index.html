<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>検索ツール</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
  overflow-x: hidden;
}

.container {
  padding: 16px;
}

/* 入力エリア */
.box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  margin-top: 40px;
  border: 1px solid rgba(255,255,255,0.1);
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-top: 15px;
  font-size: 16px;
}

/* カード */
.card {
  margin-top: 15px;
  padding: 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* ボタン */
.linkBtn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  background: linear-gradient(90deg, #6366f1, #8b5cf6);
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* メッセージ */
.empty {
  margin-top: 20px;
  color: #aaa;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <div class="box">
    <h2>検索</h2>
    <input id="k" placeholder="キーワードを入力（例：QA）">
  </div>

  <div id="list"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzOapJUtzIdFnukwpc92_ZZRueG9MiFVVb2VfAsYnutr2CsKby7Hc_Mcf_ENxumtyYF/exec";

// リアルタイム検索
document.getElementById("k").addEventListener("input", search);

async function search() {
  const keyword = document.getElementById("k").value;

  const res = await fetch(API + "?keyword=" + encodeURIComponent(keyword));
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (data.length === 0) {
    list.innerHTML = "<div class='empty'>該当なし</div>";
    return;
  }

  data.forEach(row => {
    const title = row[1];
    const url = row[2];

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div style="font-size:18px;font-weight:bold;">
        ${title}
      </div>

      <a href="${url}" target="_blank" class="linkBtn">
        📄 ドキュメントを開く
      </a>
    `;

    // カード全体クリックでも開く
    card.onclick = () => {
      window.open(url, "_blank");
    };

    list.appendChild(card);
  });
}
</script>

</body>
</html>
