<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Judge Portal v2</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: white;
      min-height: 100vh;
    }
    .container { padding: 16px; max-width: 500px; margin: 0 auto; }

    /* ボックス共通 */
    .box {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* 登録フォーム */
    .admin-toggle {
      text-align: right;
      margin-bottom: 10px;
    }
    .admin-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: #94a3b8;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }
    #addForm { display: none; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    
    /* 入力要素 */
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: white;
      margin-bottom: 10px;
      font-size: 16px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    
    .submit-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #10b981;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    /* タグ関連 */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .tag-label { font-size: 12px; color: #94a3b8; margin-top: 15px; }
    
    .favorite {
      padding: 8px 14px; border-radius: 20px;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      color: black; font-weight: bold; font-size: 12px; cursor: pointer;
    }
    .category {
      padding: 8px 14px; border-radius: 20px;
      background: rgba(255,255,255,0.15); font-size: 12px; cursor: pointer;
    }
    .category.active { background: #6366f1; }
    .subtag {
      padding: 6px 12px; border-radius: 8px;
      background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99,102,241,0.3);
      font-size: 11px; cursor: pointer; animation: fadeIn 0.3s;
    }

    /* 検索結果カード */
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .card:hover { background: rgba(255,255,255,0.1); }
    .linkBtn {
      padding: 8px 16px; border-radius: 8px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      color: white; text-decoration: none; font-size: 13px;
    }

    .loading { text-align: center; color: #6366f1; margin: 20px; }
    .empty { text-align: center; color: #64748b; margin-top: 40px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="container">
  <div class="admin-toggle">
    <button class="admin-btn" onclick="toggleAddForm()">＋ データを登録する</button>
  </div>

  <div id="addForm" class="box" style="display: none;">
    <h3 style="margin-top:0; font-size: 16px;">新規データ登録</h3>
    <input id="newTitle" placeholder="タイトル (例: デッキ不備の対応)">
    <input id="newUrl" placeholder="URL (https://...)">
    <button class="submit-btn" onclick="registerData()">スプレッドシートに登録</button>
    <div id="regMsg" style="text-align:center; font-size:12px; margin-top:10px;"></div>
  </div>

  <div class="box">
    <h2 style="margin-top:0; font-size: 18px;">ナレッジ検索</h2>
    <input id="k" placeholder="キーワードを入力..." autocomplete="off">

    <div class="tag-label">⭐ よく使う</div>
    <div id="favorites" class="tags"></div>

    <div class="tag-label">📊 カテゴリ</div>
    <div id="categories" class="tags"></div>
    <div id="subtags" class="tags"></div>
  </div>

  <div id="list"></div>
</div>

<script>
  // 🔴 ここにデプロイしたGASのURLを貼り付けてください
  const API = "https://script.google.com/macros/s/AKfycbwiJ4r4YWUOqItC53GVU8uGkmQLtAWKbtT6vu96A-rGZe8siQvHWevnr8mX-hIFRD0fOw/exec";

  const favorites = ["QA", "トラブル対応", "総合ルール"];
  const categories = {
    "初心者": ["未経験者向け", "初ジャッジ", "事前準備", "目標"],
    "大会運営": ["大会進行", "TIPS", "サイドイベント", "DC", "フィーチャー"],
    "トラブル": ["トラブル対応", "投了", "デッキ不備", "不正行為", "マークド", "遅いプレイ"],
    "ルール": ["総合ルール", "QA", "質問ch", "TL"]
  };

  const inputEl = document.getElementById("k");
  const listEl = document.getElementById("list");
  let searchTimer;

  // --- 初期化 ---
  window.onload = () => {
    renderTags();
  };

  function renderTags() {
    const favContainer = document.getElementById("favorites");
    favorites.forEach(word => {
      const el = document.createElement("div");
      el.className = "favorite";
      el.textContent = word;
      el.onclick = () => { inputEl.value = word; search(); };
      favContainer.appendChild(el);
    });

    const catContainer = document.getElementById("categories");
    Object.keys(categories).forEach(cat => {
      const el = document.createElement("div");
      el.className = "category";
      el.textContent = cat;
      el.onclick = () => showSubtags(cat, el);
      catContainer.appendChild(el);
    });
  }

  function showSubtags(cat, btn) {
    document.querySelectorAll('.category').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    
    const subContainer = document.getElementById("subtags");
    subContainer.innerHTML = "";
    categories[cat].forEach(word => {
      const el = document.createElement("div");
      el.className = "subtag";
      el.textContent = word;
      el.onclick = () => { inputEl.value = word; search(); };
      subContainer.appendChild(el);
    });
  }

  // --- 検索機能 ---
  inputEl.addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(search, 400);
  });

  async function search() {
    const keyword = inputEl.value.trim();
    if (!keyword) { listEl.innerHTML = ""; return; }

    listEl.innerHTML = `<div class="loading">検索中...</div>`;

    try {
      const res = await fetch(`${API}?keyword=${encodeURIComponent(keyword)}`);
      const data = await res.json();
      
      listEl.innerHTML = "";
      if (data.length === 0) {
        listEl.innerHTML = `<div class="empty">該当なし</div>`;
        return;
      }

      data.forEach(row => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div style="font-weight:bold; flex:1; padding-right:10px;">${row[1]}</div>
          <a href="${row[2]}" target="_blank" class="linkBtn">📄 開く</a>
        `;
        card.onclick = (e) => { if(e.target.tagName !== 'A') window.open(row[2], "_blank"); };
        listEl.appendChild(card);
      });
    } catch (e) {
      listEl.innerHTML = `<div class="empty">エラーが発生しました</div>`;
    }
  }

  // --- 登録機能 ---
  function toggleAddForm() {
    const f = document.getElementById("addForm");
    f.style.display = (f.style.display === "none") ? "block" : "none";
  }

  async function registerData() {
    const title = document.getElementById("newTitle").value;
    const url = document.getElementById("newUrl").value;
    const msg = document.getElementById("regMsg");

    if (!title || !url) return alert("入力してください");

    msg.textContent = "送信中...";
    msg.style.color = "#aaa";

    try {
      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify({ title, url })
      });
      const result = await res.json();

      if (result.status === "success") {
        msg.textContent = "登録完了！";
        msg.style.color = "#10b981";
        document.getElementById("newTitle").value = "";
        document.getElementById("newUrl").value = "";
        setTimeout(() => { toggleAddForm(); msg.textContent = ""; }, 2000);
      }
    } catch (e) {
      msg.textContent = "エラーが発生しました";
      msg.style.color = "#ef4444";
    }
  }
</script>

</body>
</html>
