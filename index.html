<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Judge Portal Master</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: #020617; color: white; min-height: 100vh; }
    .container { padding: 16px; max-width: 550px; margin: 0 auto; }
    .box { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    
    label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
    input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none; margin-bottom: 12px; }

    /* 検索グリッド */
    .search-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; }

    /* タグ関連 */
    .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .tag-btn { padding: 8px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; transition: 0.2s; }
    .tag-btn:hover { background: rgba(255,255,255,0.2); }
    .tag-btn.active { background: #6366f1; color: white; border-color: #818cf8; }
    .tag-btn.reg-selected { background: #10b981; color: white; } /* 登録時選択用 */

    /* フィルターボタン */
    .filter-row { display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    .filter-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: none; color: white; font-size: 12px; cursor: pointer; }
    .filter-btn.active { background: #fbbf24; color: black; border: none; font-weight: bold; }

    /* カード */
    .card { background: rgba(255,255,255,0.07); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); animation: fadeIn 0.3s ease; }
    .card-title { font-size: 17px; font-weight: bold; margin-bottom: 4px; }
    .card-meta { font-size: 11px; color: #94a3b8; margin-bottom: 10px; }
    .tag-badge { font-size: 10px; background: rgba(99, 102, 241, 0.2); color: #a5b4fc; padding: 2px 8px; border-radius: 4px; margin-right: 4px; border: 1px solid rgba(99,102,241,0.2); }

    .card-actions { display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; align-items: center; }
    .btn-action { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .btn-fav.active { color: #fbbf24; background: rgba(251, 191, 36, 0.15); }
    .open-link { margin-left: auto; background: linear-gradient(90deg, #6366f1, #8b5cf6); color: white; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; }

    .submit-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #10b981; color: white; font-weight: bold; cursor: pointer; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
  </style>
</head>
<body>

<div class="container">
  <div style="text-align: right; margin-bottom: 10px;">
    <button onclick="toggleForm()" id="toggleBtn" style="background:none; border:1px solid #475569; color:#94a3b8; padding:8px 16px; border-radius:10px; cursor:pointer; font-size:12px;">＋ 新規登録</button>
  </div>

  <div id="regForm" class="box" style="display: none;">
    <h3 style="margin-top:0;">ナレッジ登録</h3>
    <label>タイトル</label><input id="inTitle" placeholder="例: スタックのルールについて">
    <label>URL</label><input id="inUrl" placeholder="https://...">
    <label>タグを選択 (複数可)</label>
    <div id="regTagBox" class="tag-container"></div>
    <label style="margin-top:15px;">筆者</label><select id="inAuthor"></select>
    <button class="submit-btn" onclick="submitData()">シートに保存</button>
    <div id="status" style="text-align:center; font-size:12px; margin-top:10px;"></div>
  </div>

  <div class="box">
    <div class="search-grid">
      <div><label>キーワード</label><input id="searchQuery" placeholder="検索..." style="margin-bottom:0;"></div>
      <div><label>筆者</label><select id="searchAuthor" style="margin-bottom:0;"><option value="">全員</option></select></div>
    </div>
    
    <label style="margin-top:15px;">タグでクイック検索</label>
    <div id="searchTagBox" class="tag-container"></div>

    <div class="filter-row">
      <button id="showAllBtn" class="filter-btn active" onclick="setFilter('all')">すべて表示</button>
      <button id="showFavBtn" class="filter-btn" onclick="setFilter('fav')">⭐ お気に入り済</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
  // 🔴 あなたのGAS URL
  const API_URL = "https://script.google.com/macros/s/AKfycbxjQ5QJoiC3xe_EaSszC_y2XKzt70NEPaq0BVnc-jV0I057S4pvHaPDEjJbUurBx9oT_A/exec";

  const tagsList = ["QA", "ルール", "トラブル", "初心者", "運営", "失格調査", "フロアルール"];
  let selectedRegTags = new Set();
  let currentFilter = 'all';
  let myFavorites = JSON.parse(localStorage.getItem('judge_fav_v2') || '[]');

  window.onload = async () => {
    const regBox = document.getElementById("regTagBox");
    const searchBox = document.getElementById("searchTagBox");

    tagsList.forEach(t => {
      // 登録用のタグボタン
      const rb = document.createElement("div");
      rb.className = "tag-btn"; rb.textContent = t;
      rb.onclick = () => { rb.classList.toggle("reg-selected"); selectedRegTags.has(t) ? selectedRegTags.delete(t) : selectedRegTags.add(t); };
      regBox.appendChild(rb);

      // 検索用のタグボタン
      const sb = document.createElement("div");
      sb.className = "tag-btn"; sb.textContent = t;
      sb.onclick = () => {
        const input = document.getElementById("searchQuery");
        // すでにそのタグが入力されていれば消す、なければ入れる（簡易トグル）
        input.value = (input.value === t) ? "" : t;
        doSearch();
      };
      searchBox.appendChild(sb);
    });

    // 筆者リスト取得
    try {
      const res = await fetch(`${API_URL}?type=authors`);
      const authors = await res.json();
      authors.forEach(name => {
        document.getElementById("inAuthor").add(new Option(name, name));
        document.getElementById("searchAuthor").add(new Option(name, name));
      });
    } catch(e) {}
  };

  function setFilter(mode) {
    currentFilter = mode;
    document.getElementById('showAllBtn').classList.toggle('active', mode === 'all');
    document.getElementById('showFavBtn').classList.toggle('active', mode === 'fav');
    doSearch();
  }

  function toggleFav(url) {
    if (myFavorites.includes(url)) myFavorites = myFavorites.filter(u => u !== url);
    else myFavorites.push(url);
    localStorage.setItem('judge_fav_v2', JSON.stringify(myFavorites));
    doSearch();
  }

  async function sendLike(rowNum, btn) {
    btn.disabled = true;
    const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "like", rowNum }) });
    const result = await res.json();
    if (result.status === "success") {
      btn.querySelector('.l-cnt').textContent = result.newLikes;
      btn.style.background = "rgba(244, 114, 182, 0.2)";
    }
  }

  function toggleForm() {
    const f = document.getElementById("regForm");
    f.style.display = (f.style.display === "none") ? "block" : "none";
  }

  let timer;
  document.getElementById("searchQuery").oninput = () => { clearTimeout(timer); timer = setTimeout(doSearch, 400); };
  document.getElementById("searchAuthor").onchange = doSearch;

  async function doSearch() {
    const q = document.getElementById("searchQuery").value.trim();
    const author = document.getElementById("searchAuthor").value;
    const resDiv = document.getElementById("results");

    // タグボタンのハイライト更新
    document.querySelectorAll("#searchTagBox .tag-btn").forEach(btn => {
      btn.classList.toggle("active", btn.textContent === q);
    });

    if (!q && !author && currentFilter === 'all') { resDiv.innerHTML = ""; return; }
    resDiv.innerHTML = `<div style="text-align:center; padding:20px; color:#6366f1;">検索中...</div>`;

    try {
      const response = await fetch(`${API_URL}?keyword=${encodeURIComponent(q)}&author=${encodeURIComponent(author)}`);
      let data = await response.json();

      if (currentFilter === 'fav') data = data.filter(item => myFavorites.includes(item.url));

      resDiv.innerHTML = "";
      if (data.length === 0) { resDiv.innerHTML = `<div style="text-align:center; color:#64748b; margin-top:20px;">見つかりませんでした</div>`; return; }

      data.forEach(item => {
        const isFav = myFavorites.includes(item.url);
        const tagsHtml = item.tags ? item.tags.split(',').map(t => `<span class="tag-badge">${t.trim()}</span>`).join('') : '';
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-title">${item.title}</div>
          <div class="card-meta">👤 ${item.author}</div>
          <div style="margin-bottom:12px;">${tagsHtml}</div>
          <div class="card-actions">
            <button class="btn-action" style="color:#f472b6" onclick="sendLike(${item.rowNum}, this)">❤️ <span class="l-cnt">${item.likes}</span></button>
            <button class="btn-action btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${item.url}')">${isFav ? '★ 保存済み' : '☆ 保存'}</button>
            <a href="${item.url}" target="_blank" class="open-link">開く ↗</a>
          </div>
        `;
        resDiv.appendChild(card);
      });
    } catch (e) { resDiv.innerHTML = "エラーが発生しました"; }
  }

  async function submitData() {
    const title = document.getElementById("inTitle").value;
    const url = document.getElementById("inUrl").value;
    const author = document.getElementById("inAuthor").value;
    if (!title || !url) return alert("タイトルとURLは必須です");
    
    document.getElementById("status").textContent = "保存中...";
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ title, url, author, tags: Array.from(selectedRegTags).join(', ') })
    });
    const result = await res.json();
    if (result.status === "success") {
      alert("登録完了！");
      location.reload();
    }
  }
</script>
</body>
</html>
