<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
}

.container { padding: 16px; }

.box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  margin-top: 30px;
  border: 1px solid rgba(255,255,255,0.1);
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

/* 共通タグ */
.tags {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

/* よく使う */
.favorite {
  padding: 10px 14px;
  border-radius: 999px;
  background: linear-gradient(90deg, #f59e0b, #fbbf24);
  color: black;
  font-weight: bold;
  font-size: 13px;
  cursor: pointer;
}

/* カテゴリ */
.category {
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.15);
  font-size: 13px;
  cursor: pointer;
}

/* タグ */
.tag {
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  font-size: 12px;
  cursor: pointer;
}

/* カード */
.card {
  margin-top: 15px;
  padding: 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
}

.linkBtn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  background: linear-gradient(90deg, #6366f1, #8b5cf6);
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.empty {
  margin-top: 20px;
  color: #aaa;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <div class="box">
    <h2>検索</h2>
    <input id="k" placeholder="キーワードを入力">

    <!-- ⭐ よく使う -->
    <div style="margin-top:15px;font-size:14px;color:#aaa;">⭐ よく使う</div>
    <div id="favorites" class="tags"></div>

    <!-- 📊 カテゴリ -->
    <div style="margin-top:15px;font-size:14px;color:#aaa;">カテゴリ</div>
    <div id="categories" class="tags"></div>

    <!-- 🏷 タグ -->
    <div id="tags" class="tags"></div>
  </div>

  <div id="list"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzOapJUtzIdFnukwpc92_ZZRueG9MiFVVb2VfAsYnutr2CsKby7Hc_Mcf_ENxumtyYF/exec";

// ⭐ よく使う
const favorites = ["QA","トラブル対応","総合ルール"];

// 📊 カテゴリ
const categories = {
  "初心者": ["未経験者向け","初ジャッジ","事前準備","目標","改善点"],
  "大会運営": ["大会進行","TIPS","サイドイベント","DC","フィーチャー"],
  "トラブル": ["トラブル対応","投了","デッキ不備","不正行為","スリーブ","体力差","マークド","失格調査","遅いプレイ"],
  "ルール": ["総合ルール","QA","質問ch","TL","HJ"]
};

// ⭐ よく使う生成
const favContainer = document.getElementById("favorites");
favorites.forEach(word => {
  const tag = document.createElement("div");
  tag.className = "favorite";
  tag.textContent = word;

  tag.onclick = () => {
    document.getElementById("k").value = word;
    search();
  };

  favContainer.appendChild(tag);
});

// 📊 カテゴリ生成
const categoryContainer = document.getElementById("categories");
const tagContainer = document.getElementById("tags");

Object.keys(categories).forEach(cat => {
  const btn = document.createElement("div");
  btn.className = "category";
  btn.textContent = cat;

  btn.onclick = () => {
    tagContainer.innerHTML = "";

    categories[cat].forEach(word => {
      const tag = document.createElement("div");
      tag.className = "tag";
      tag.textContent = word;

      tag.onclick = () => {
        document.getElementById("k").value = word;
        search();
      };

      tagContainer.appendChild(tag);
    });
  };

  categoryContainer.appendChild(btn);
});

// 🔍 検索
document.getElementById("k").addEventListener("input", search);

async function search() {
  const keyword = document.getElementById("k").value;

  const res = await fetch(API + "?keyword=" + encodeURIComponent(keyword));
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (data.length === 0) {
    list.innerHTML = "<div class='empty'>該当なし</div>";
    return;
  }

  data.forEach(row => {
    const title = row[1];
    const url = row[2];

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div style="font-size:18px;font-weight:bold;">
        ${title}
      </div>
      <a href="${url}" target="_blank" class="linkBtn">
        📄 開く
      </a>
    `;

    card.onclick = () => window.open(url, "_blank");

    list.appendChild(card);
  });
}
</script>

</body>
</html>
