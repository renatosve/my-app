<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
}

.container {
  padding: 16px;
}

.box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  margin-top: 40px;
  border: 1px solid rgba(255,255,255,0.1);
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-top: 15px;
  font-size: 16px;
}

/* タグ */
.tags {
  margin-top: 15px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  font-size: 13px;
  cursor: pointer;
}

/* カード */
.card {
  margin-top: 15px;
  padding: 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}

.linkBtn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  background: linear-gradient(90deg, #6366f1, #8b5cf6);
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.empty {
  margin-top: 20px;
  color: #aaa;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <div class="box">
    <h2>検索</h2>
    <input id="k" placeholder="キーワードを入力">

    <!-- タグ -->
    <div id="tags" class="tags"></div>
  </div>

  <div id="list"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzOapJUtzIdFnukwpc92_ZZRueG9MiFVVb2VfAsYnutr2CsKby7Hc_Mcf_ENxumtyYF/exec";

// キーワード一覧
const keywords = [
"未経験者向け","初ジャッジ","事前準備","目標","改善点",
"大会進行","TIPS","サイドイベント","DC","フィーチャー",
"トラブル対応","投了","総合ルール","デッキ不備","不正行為",
"スリーブ","体力差","マークド","失格調査","遅いプレイ",
"TL","HJ","質問ch","QA"
];

// タグ生成
const tagContainer = document.getElementById("tags");

keywords.forEach(word => {
  const tag = document.createElement("div");
  tag.className = "tag";
  tag.textContent = word;

  tag.onclick = () => {
    document.getElementById("k").value = word;
    search();

    // ハイライト
    document.querySelectorAll(".tag").forEach(t => t.style.background = "rgba(255,255,255,0.1)");
    tag.style.background = "#6366f1";
  };

  tagContainer.appendChild(tag);
});

// リアルタイム検索
document.getElementById("k").addEventListener("input", search);

async function search() {
  const keyword = document.getElementById("k").value;

  const res = await fetch(API + "?keyword=" + encodeURIComponent(keyword));
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (data.length === 0) {
    list.innerHTML = "<div class='empty'>該当なし</div>";
    return;
  }

  data.forEach(row => {
    const title = row[1];
    const url = row[2];

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div style="font-size:18px;font-weight:bold;">
        ${title}
      </div>

      <a href="${url}" target="_blank" class="linkBtn">
        📄 ドキュメントを開く
      </a>
    `;

    card.onclick = () => {
      window.open(url, "_blank");
    };

    list.appendChild(card);
  });
}
</script>

</body>
</html>
