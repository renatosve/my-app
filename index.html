<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h2>検索</h2>
<input id="k">
<button onclick="search()">検索</button>

<div id="list"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzOapJUtzIdFnukwpc92_ZZRueG9MiFVVb2VfAsYnutr2CsKby7Hc_Mcf_ENxumtyYF/exec";

async function search() {
  const keyword = document.getElementById("k").value;
  console.log("検索:", keyword);

  const res = await fetch(API + "?keyword=" + encodeURIComponent(keyword));
  const data = await res.json();

  console.log("結果:", data);

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(row => {
    const div = document.createElement("div");
    div.textContent = row[1] + " / " + row[2];
    list.appendChild(div);
  });
}
</script>

</body>
</html>
