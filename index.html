<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>検索ツール</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
}

/* コンテナ */
.container {
  padding: 20px;
}

/* カードUI */
.box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  margin-top: 50px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* 入力 */
input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-top: 15px;
  font-size: 16px;
}

/* ボタン */
button {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-top: 15px;
  font-size: 16px;
  background: linear-gradient(90deg, #6366f1, #8b5cf6);
  color: white;
}

/* 検索結果カード */
.card {
  margin-top: 15px;
  padding: 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* ステータス */
.green {
  color: #4ade80;
}
.red {
  color: #f87171;
}
</style>
</head>

<body>

<div class="container">

  <div class="box">
    <h2>検索</h2>

    <input id="k" placeholder="名前で検索">

    <button onclick="search()">検索</button>
  </div>

  <div id="list"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzOapJUtzIdFnukwpc92_ZZRueG9MiFVVb2VfAsYnutr2CsKby7Hc_Mcf_ENxumtyYF/exec";

// リアルタイム検索
document.getElementById("k").addEventListener("input", search);

async function search() {
  const keyword = document.getElementById("k").value;

  const res = await fetch(API + "?keyword=" + encodeURIComponent(keyword));
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(row => {
    const card = document.createElement("div");
    card.className = "card";

    const statusText = row[2] == 10 ? "チェックイン済" : "未チェックイン";
    const statusClass = row[2] == 10 ? "green" : "red";

    card.innerHTML = `
      <div style="font-size:20px;font-weight:bold;">
        ${row[1]}
      </div>
      <div class="${statusClass}" style="margin-top:8px;">
        ${statusText}
      </div>
    `;

    // タップでステータス切替
    card.onclick = async () => {
      await fetch(API, {
        method: "POST",
        body: JSON.stringify({
          name: row[1],
          status: row[2] == 10 ? 11 : 10
        })
      });

      search();
    };

    list.appendChild(card);
  });
}
</script>

</body>
</html>
